<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- V 4.11 PWA -->
    <title>X-Timer</title>
    <link rel="icon" href="Images/icon.svg" type="image/svg+xml">

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="X-Timer">
    <link rel="apple-touch-icon" href="Images/icon-192.png">

    <!-- Theme / Browser chrome -->
    <meta name="theme-color" content="#1B2C78">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="X-Timer">
    <meta name="description" content="Interval timer for HIIT, Tabata, and custom workout sets">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&family=Instrument+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Style CSS -->
    <link rel="stylesheet" href="CSS/base.css">
    <link rel="stylesheet" href="CSS/layout.css">
    <link rel="stylesheet" href="CSS/components.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header id="main-header">
            <span id="app-brand">X-TIMER</span>
            <h1 id="header-title">Home</h1>
        </header>

        <!-- Main Content -->
        <main id="main-content" class="view-transition">
            <!-- Views injected via JS -->
        </main>

        <!-- Bottom Navigation -->
        <nav id="bottom-nav">
            <button class="nav-item active" data-view="presets">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span>Home</span>
            </button>
            <button class="nav-item" data-view="dashboard">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                <span>Stats</span>
            </button>
            <button class="nav-item" data-view="settings">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                <span>Settings</span>
            </button>
            <button id="add-btn" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                <span>Add</span>
            </button>
        </nav>

        <!-- Timer Player Overlay -->
        <div id="player-view" class="overlay hidden">
            <div class="player-header">
                <h2 id="player-title">Timer Name</h2>
            </div>
            <div class="player-body">
                <div class="timer-display">
                    <div id="player-phase" class="phase-label">Ready</div>
                    <div id="player-time" class="time-label">00:00</div>
                    <div id="player-progress" class="progress-label">Set 1/1</div>
                </div>
            </div>
            <div class="player-controls">
                <button id="player-prev-btn" class="secondary-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg>
                </button>
                <button id="player-reset-btn" class="secondary-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg>
                </button>
                <button id="player-play-btn" class="primary-btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"></path></svg></button>
                <button id="close-player-btn" class="secondary-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                </button>
                <button id="player-next-btn" class="secondary-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
                </button>
            </div>
        </div>

        <!-- Add/Edit Form Overlay -->
        <div id="form-view" class="overlay hidden">
            <div class="form-header">
                <button id="close-form-btn" class="ghost-btn" style="font-size: 14px;">Cancel</button>
                <h2 id="form-title">New Timer</h2>
                <button id="save-form-btn" class="ghost-btn" style="font-size: 14px; color: var(--light-periwinkle);">Save</button>
            </div>
            <div class="form-body">
                <div class="input-group">
                    <label>Timer Name</label>
                    <input type="text" id="preset-name" placeholder="e.g. Tabata, HIIT">
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label>Prepare (s)</label> <!-- [D] Rename -->
                        <input type="number" id="preset-prep" value="10" min="0">
                    </div>
                    <div class="input-group">
                        <label>Work (s)</label>
                        <input type="number" id="preset-work" value="20" min="1">
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label>Rest (s)</label>
                        <input type="number" id="preset-rest" value="10" min="0">
                    </div>
                    <div class="input-group">
                        <label>Sets</label>
                        <input type="number" id="preset-sets" value="8" min="1">
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-group" style="width: 100%;">
                        <label>Rest B/w Sets (s)</label>
                        <input type="number" id="preset-rest-sets" value="0" min="0">
                    </div>
                </div>
                <div class="input-group" style="margin-bottom: 32px;">
                    <label>Cool Down (s)</label>
                    <input type="number" id="preset-cooldown" value="0" min="0">
                </div>
                <button id="delete-preset-btn" class="danger-btn hidden">Delete Timer</button>
            </div>
        </div>

        <!-- Stats Clear Modal [H] -->
        <div id="modal-overlay" class="modal-overlay" onclick="closeClearStatsModal()"></div>
        <div id="stats-clear-modal">
            <div style="margin-bottom: 16px;">
                <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 4px;">Clear Stats</h3>
                <p style="font-size: 14px; color: #888;">Select an option to clear your workout history.</p>
            </div>
            <button class="clear-option" onclick="clearStats('now')">Clear Stats Now</button>
            <button class="clear-option" onclick="clearStats('today')">Clear Stats Today (Including Now)</button>
            <button class="clear-option" onclick="clearStats('all')">Clear Stats All-Time (Including Today)</button>
            <button class="clear-option" onclick="closeClearStatsModal()" style="color: #FF6B6B; margin-top: 8px; font-weight: bold;">CANCEL</button>
        </div>

    </div>

    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <!-- Script JS -->
    <script src="JS/state.js"></script>
    <script src="JS/audio.js"></script>
    <script src="JS/timer.js"></script>
    <script src="JS/ui.js"></script>
    <script src="JS/main.js"></script>

    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then((reg) => {
              console.log('[PWA] Service worker registered:', reg.scope);
              // Pre-cache audio files after app loads
              if (reg.active) {
                reg.active.postMessage({ type: 'CACHE_AUDIO' });
              }
            })
            .catch((err) => console.warn('[PWA] SW registration failed:', err));
        });
      }
    </script>
</body>
</html>
